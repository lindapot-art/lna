<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Medical Investment System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0b0f1a;
 color:#e5e7eb;
}

.layout{
 display:flex;
 min-height:100vh;
}

.sidebar{
 width:300px;
 background:#0a0f1d;
 border-right:1px solid #1f2937;
 padding:12px;
 overflow-y:auto;
}

.app{
 padding:10px;
 margin:6px 0;
 border-radius:8px;
 border:1px solid #1f2937;
 cursor:pointer;
 background:#111827;
 font-size:13px;
}

.app.active{border-color:#22c55e;}

.main{
 flex:1;
 padding:14px;
}

.card{
 background:#111827;
 border:1px solid #1f2937;
 border-radius:12px;
 padding:12px;
 margin-bottom:12px;
}

.section{
 margin-top:10px;
 padding:10px;
 border-radius:8px;
 background:#0b1220;
 border:1px solid #1f2937;
}

p{
 font-size:13px;
 line-height:1.6;
 opacity:0.9;
 margin:6px 0;
}

input[type=range]{
 width:100%;
}

select{
 background:#0b1220;
 color:white;
 border:1px solid #1f2937;
 padding:6px;
 border-radius:6px;
}
</style>
</head>

<body>

<div class="layout">

<!-- NAV -->
<div class="sidebar">
<h3>AI Apps</h3>
<div id="nav"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<label>Tier:</label>
<select id="tier" onchange="render()">
<option value="3">$3K MVP</option>
<option value="7" selected>$7K Product</option>
<option value="12">$12K Enterprise</option>
</select>
</div>

<div id="view"></div>

</div>

</div>

<script>

/* FULL DATASET (LOCKED) */
const apps=[
{name:"AI Clinical Documentation",what:"AI converts doctor-patient conversations into structured medical documentation.",how:"Speech-to-text → NLP → SOAP notes → EHR.",why:"Doctors spend up to 60% on documentation.",gtm:"Clinics → hospitals.",baseClinic:50,baseRevenue:800},
{name:"Remote Patient Monitoring",what:"Continuous patient monitoring system.",how:"Devices → AI → alerts.",why:"Events happen outside hospitals.",gtm:"Elderly care.",baseClinic:80,baseRevenue:600},
{name:"AI Intake Triage",what:"Pre-screen patients.",how:"AI routes cases.",why:"Improves efficiency.",gtm:"Urgent care.",baseClinic:60,baseRevenue:500},
{name:"Billing Optimization AI",what:"Finds missed billing.",how:"Scans records.",why:"Hospitals lose revenue.",gtm:"CFOs.",baseClinic:40,baseRevenue:1200},
{name:"Compliance Monitoring AI",what:"Tracks compliance.",how:"Log analysis.",why:"Avoid penalties.",gtm:"Enterprise.",baseClinic:30,baseRevenue:1500},
{name:"Staff Scheduling AI",what:"Optimizes staffing.",how:"Forecasting.",why:"Reduce costs.",gtm:"Ops teams.",baseClinic:70,baseRevenue:700},
{name:"Hospital Analytics Dashboard",what:"Real-time insights.",how:"Data aggregation.",why:"Better decisions.",gtm:"Leadership.",baseClinic:20,baseRevenue:2500},
{name:"AI Patient CRM",what:"Retention system.",how:"Automation.",why:"Increase LTV.",gtm:"Clinics.",baseClinic:90,baseRevenue:400},
{name:"Drug Interaction AI",what:"Detects risks.",how:"Prescription analysis.",why:"Avoid errors.",gtm:"Doctors.",baseClinic:100,baseRevenue:300},
{name:"Telehealth AI",what:"Virtual care AI.",how:"AI consult + docs.",why:"Scale telehealth.",gtm:"Startups.",baseClinic:60,baseRevenue:900}
];

let selected=0;

/* NAV */
function renderNav(){
 let html="";
 apps.forEach((a,i)=>{
  html+=`<div class="app ${i===selected?'active':''}" onclick="selectApp(${i})">${a.name}</div>`;
 });
 document.getElementById("nav").innerHTML=html;
}

/* SELECT */
function selectApp(i){
 selected=i;
 render();
}

/* MULTIPLIER */
function getMultiplier(){
 let t=+document.getElementById("tier").value;
 return t===3?0.6:t===7?1:t===12?1.5:1;
}

/* RENDER */
function render(){

 renderNav();

 let a=apps[selected];
 let m=getMultiplier();

 document.getElementById("view").innerHTML=`

<div class="card">

<h2>${a.name}</h2>

<div class="section">
<p><b>What it is:</b> ${a.what}</p>
<p><b>How it works:</b> ${a.how}</p>
<p><b>Why it matters:</b> ${a.why}</p>
<p><b>Go-to-market:</b> ${a.gtm}</p>
</div>

<div class="section">

<p><b>Facilities: <span id="facVal">${Math.round(a.baseClinic)}</span></b></p>
<input type="range" min="10" max="500" value="${a.baseClinic}" id="fac" oninput="calc()">

<p><b>Revenue per facility: $<span id="revVal">${a.baseRevenue}</span></b></p>
<input type="range" min="100" max="3000" value="${a.baseRevenue}" id="rev" oninput="calc()">

<p id="profit" style="margin-top:10px;"></p>

</div>

<div class="section">
<p style="opacity:0.7">Development by Photon Bounce</p>
</div>

</div>
`;

 calc();
}

/* CALC */
function calc(){
 let f=+document.getElementById("fac").value;
 let r=+document.getElementById("rev").value;
 let m=getMultiplier();

 document.getElementById("facVal").innerText=Math.round(f*m);
 document.getElementById("revVal").innerText=Math.round(r*m);

 let total=Math.round(f*m)*Math.round(r*m);

 document.getElementById("profit").innerHTML=
 "<b>Total Monthly Revenue: $"+total.toLocaleString()+"</b>";
}

/* INIT */
renderNav();
render();

</script>

</body>
</html>
