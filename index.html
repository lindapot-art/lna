<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Medical Investment System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0b0f1a;
 color:#e5e7eb;
}

.layout{
 display:flex;
 min-height:100vh;
}

/* SIDEBAR */
.sidebar{
 width:300px;
 background:#0a0f1d;
 border-right:1px solid #1f2937;
 padding:12px;
 overflow-y:auto;
}

.sidebar h3{
 margin:0 0 10px 0;
}

.app{
 padding:10px;
 margin:6px 0;
 border-radius:8px;
 border:1px solid #1f2937;
 cursor:pointer;
 background:#111827;
 font-size:13px;
}

.app.active{
 border-color:#22c55e;
}

/* MAIN */
.main{
 flex:1;
 padding:14px;
}

.card{
 background:#111827;
 border:1px solid #1f2937;
 border-radius:12px;
 padding:12px;
 margin-bottom:12px;
}

.section{
 margin-top:10px;
 padding:10px;
 border-radius:8px;
 background:#0b1220;
 border:1px solid #1f2937;
}

h2{
 font-size:16px;
 margin:0 0 10px 0;
}

p{
 font-size:13px;
 line-height:1.6;
 opacity:0.9;
 margin:6px 0;
}

input[type=range]{
 width:100%;
}

select{
 background:#0b1220;
 color:white;
 border:1px solid #1f2937;
 padding:6px;
 border-radius:6px;
}

.value{
 font-weight:bold;
 color:#22c55e;
}
</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR NAV -->
<div class="sidebar">
<h3>AI Medical Apps</h3>
<div id="nav"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<label>Development Tier:</label>
<select id="tier" onchange="render()">
<option value="3">$3K MVP</option>
<option value="7" selected>$7K Product</option>
<option value="12">$12K Enterprise</option>
</select>
</div>

<div id="view"></div>

</div>

</div>

<script>

/* ================= FULL LOCKED DATASET ================= */
const apps=[
{
name:"AI Clinical Documentation",
what:"AI converts doctor-patient conversations into structured medical documentation.",
how:"Speech-to-text → NLP → SOAP notes → EHR integration.",
why:"Doctors spend up to 60% of their time on documentation instead of care.",
gtm:"Start with clinics and hospice networks, then expand into hospitals.",
baseClinic:50,
baseRevenue:800
},
{
name:"Remote Patient Monitoring",
what:"Continuous monitoring of patient health outside hospitals.",
how:"IoT devices send data → AI detects anomalies → alerts.",
why:"Most medical issues occur outside hospital supervision.",
gtm:"Elderly care and post-acute providers.",
baseClinic:80,
baseRevenue:600
},
{
name:"AI Intake Triage",
what:"Pre-visit AI system to assess patient urgency.",
how:"Patients submit symptoms → AI evaluates → routes care.",
why:"Reduces overload from non-critical patients.",
gtm:"Urgent care clinics.",
baseClinic:60,
baseRevenue:500
},
{
name:"Billing Optimization AI",
what:"Identifies missed billing opportunities.",
how:"Analyzes records vs billing codes.",
why:"Hospitals lose millions due to underbilling.",
gtm:"Hospital finance departments.",
baseClinic:40,
baseRevenue:1200
},
{
name:"Compliance Monitoring AI",
what:"Tracks healthcare compliance automatically.",
how:"Scans logs → flags violations.",
why:"Prevents fines and legal issues.",
gtm:"Enterprise hospitals.",
baseClinic:30,
baseRevenue:1500
},
{
name:"Staff Scheduling AI",
what:"Optimizes workforce scheduling.",
how:"Forecasts demand → balances staffing.",
why:"Reduces labor costs significantly.",
gtm:"Hospital operations teams.",
baseClinic:70,
baseRevenue:700
},
{
name:"Hospital Analytics Dashboard",
what:"Real-time hospital performance insights.",
how:"Aggregates operational and financial data.",
why:"Improves executive decision-making.",
gtm:"Hospital leadership.",
baseClinic:20,
baseRevenue:2500
},
{
name:"AI Patient CRM",
what:"Patient engagement and retention system.",
how:"Automates messaging and follow-ups.",
why:"Improves lifetime value.",
gtm:"Private clinics.",
baseClinic:90,
baseRevenue:400
},
{
name:"Drug Interaction AI",
what:"Detects harmful drug combinations.",
how:"Analyzes prescriptions instantly.",
why:"Reduces medical errors and liability.",
gtm:"Doctors and pharmacies.",
baseClinic:100,
baseRevenue:300
},
{
name:"Telehealth AI",
what:"AI-powered virtual consultation assistant.",
how:"Handles intake, conversation, documentation.",
why:"Scales telehealth efficiently.",
gtm:"Telemedicine startups.",
baseClinic:60,
baseRevenue:900
}
];

let selected=0;

/* NAV */
function renderNav(){
 let html="";
 apps.forEach((a,i)=>{
  html+=`<div class="app ${i===selected?'active':''}" onclick="selectApp(${i})">${a.name}</div>`;
 });
 document.getElementById("nav").innerHTML=html;
}

/* SELECT */
function selectApp(i){
 selected=i;
 render();
}

/* TIER MULTIPLIER */
function getMultiplier(){
 let t=+document.getElementById("tier").value;
 return t===3?0.6:t===7?1:1.5;
}

/* MAIN RENDER */
function render(){

 renderNav();

 let a=apps[selected];
 let m=getMultiplier();

 document.getElementById("view").innerHTML=`

<div class="card">

<h2>${a.name}</h2>

<div class="section">
<p><b>What it is:</b> ${a.what}</p>
<p><b>How it works:</b> ${a.how}</p>
<p><b>Why it matters:</b> ${a.why}</p>
<p><b>Go-to-market:</b> ${a.gtm}</p>
</div>

<div class="section">

<p>Facilities: <span class="value" id="facVal">${a.baseClinic}</span></p>
<input type="range" min="10" max="500" value="${a.baseClinic}" id="fac" oninput="calc()">

<p>Revenue per facility: $<span class="value" id="revVal">${a.baseRevenue}</span></p>
<input type="range" min="100" max="3000" value="${a.baseRevenue}" id="rev" oninput="calc()">

<p id="profit" style="margin-top:10px;"></p>

</div>

<div class="section">
<p style="opacity:0.7">Development by Photon Bounce</p>
</div>

</div>
`;

 calc();
}

/* CALC */
function calc(){
 let f=+document.getElementById("fac").value;
 let r=+document.getElementById("rev").value;
 let m=getMultiplier();

 let fAdj=Math.round(f*m);
 let rAdj=Math.round(r*m);
 let total=fAdj*rAdj;

 document.getElementById("facVal").innerText=fAdj;
 document.getElementById("revVal").innerText=rAdj;

 document.getElementById("profit").innerHTML=
 "<b>Total Monthly Revenue: $"+total.toLocaleString()+"</b>";
}

/* INIT */
renderNav();
render();

</script>

</body>
</html>
